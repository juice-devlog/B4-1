<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- 네비게이션 -->
  <header id="header">
    <nav>
      <a href="#hero" class="logo">MyPortfolio</a>
      <button class="hamburger" id="hamburger">☰</button>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="#about">About</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
        <li>
          <button id="theme-toggle">🌙</button>
        </li>
      </ul>
    </nav>
  </header>

  <main>
    <!-- Hero -->
    <section id="hero">
      <h1>안녕하세요, 박주영입니다</h1>
      <div class="hero-buttons">
        <a href="#projects" class="btn btn-primary">프로젝트 보기</a>
        <a href="#contact" class="btn btn-secondary">연락하기</a>
      </div>
    </section>

    <!-- About -->
    <section id="about" class="section hidden">
      <h2>About Me</h2>
      <div class="about-content">
        <img src="images/profile.jpg" alt="프로필 사진" />
        <p>코디세이 학습자</p>
      </div>
    </section>

    <!-- Skills -->
    <section id="skills" class="section hidden">
      <h2>Skills</h2>
      <ul class="skills-list">
        <li>HTML</li><li>CSS</li><li>JavaScript</li><li>Git</li>
      </ul>
    </section>

    <!-- Projects -->
    <section id="projects" class="section hidden">
      <h2>Projects</h2>
      <div id="projects-container">
        <!-- JS가 렌더링 -->
      </div>
    </section>

    <!-- Contact -->
    <section id="contact" class="section hidden">
      <h2>Contact</h2>
      <form id="contact-form" novalidate>
        <div class="form-group">
          <label for="name">이름</label>
          <input type="text" id="name" name="name" />
          <span class="error-msg" id="name-error"></span>
        </div>
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" />
          <span class="error-msg" id="email-error"></span>
        </div>
        <div class="form-group">
          <label for="message">메시지</label>
          <textarea id="message" name="message"></textarea>
          <span class="error-msg" id="message-error"></span>
        </div>
        <button type="submit" class="btn btn-primary">전송</button>
        <p id="form-success" class="hidden">메시지가 전송되었습니다!</p>
      </form>
    </section>
  </main>

  <footer>
    <p>© 2026 Jooyoung Park</p>
    <div class="social-links">
      <a href="https://github.com/juice-devlog" target="_blank" rel="noopener">GitHub</a>
      <a href="#" target="_blank" rel="noopener">LinkedIn</a>
    </div>
  </footer>

  <!-- 스크롤 탑 버튼 -->
  <button id="scroll-top" class="hidden">↑</button>

  <script src="js/main.js" defer></script>
</body>
</html>
